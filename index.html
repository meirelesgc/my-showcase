<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio</title>

    <!-- 1. Avisa o Trunk para compilar o seu código Rust (Isto resolve o erro) -->
    <link data-trunk rel="rust" />

    <!-- 2. Avisa o Trunk para processar o seu SCSS -->
    <link data-trunk rel="scss" href="index.scss" />
</head>

<body>
    <!-- O Yew vai injetar a sua LandingPage aqui dentro automaticamente -->

    <!-- 3. Scripts do GSAP e a função de scroll que criamos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        window.initHorizontalScroll = function (containerSelector) {
            gsap.registerPlugin(ScrollTrigger);

            let container = document.querySelector(containerSelector);
            if (!container) return;

            let sections = gsap.utils.toArray(containerSelector + " .horizontal-item");

            gsap.to(sections, {
                xPercent: -100 * (sections.length - 1),
                ease: "none",
                scrollTrigger: {
                    trigger: containerSelector,
                    pin: true,
                    scrub: 1,
                    end: () => "+=" + container.offsetWidth
                }
            });
        };
    </script>
</body>

</html>
